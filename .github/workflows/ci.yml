name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  # ==========================================================================
  # Cross-platform testing (6-platform matrix)
  # ==========================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test (default features, includes zencodec)
        run: cargo test

      - name: Test (all-codecs + zencodec)
        run: cargo test --features all-codecs

      - name: Check (std only, no codecs)
        run: cargo check --no-default-features --features std

  # ==========================================================================
  # Feature permutations
  # ==========================================================================
  feature-perms:
    name: Feature permutations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check (no default features, std only)
        run: cargo check --no-default-features --features std

      - name: Check (all usable features)
        run: cargo check --features "all-codecs,zencodec"

      - name: Test (individual codecs)
        run: |
          cargo test --no-default-features --features "std,deflate,lzw"
          cargo test --no-default-features --features "std,fax,deflate,lzw"
          cargo test --no-default-features --features "std,jpeg,deflate,lzw"
          cargo test --no-default-features --features "std,webp,deflate,lzw"
          cargo test --no-default-features --features "std,zstd,deflate,lzw"

      - name: Test (zencodec without default codecs)
        run: cargo test --no-default-features --features "std,deflate,lzw,zencodec"

  # ==========================================================================
  # Clippy
  # ==========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (all usable features)
        run: cargo clippy --all-targets --features "all-codecs,zencodec" -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features --features std -- -D warnings

  # ==========================================================================
  # Format
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ==========================================================================
  # MSRV
  # ==========================================================================
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo hack check --rust-version

  # ==========================================================================
  # Documentation
  # ==========================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --features "all-codecs,zencodec" --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ==========================================================================
  # Code coverage
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: cargo llvm-cov --features "all-codecs,zencodec" --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
