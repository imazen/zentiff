name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|, path = "\.\./zenpixels/zenpixels"||g' \
            -e '/\[patch.crates-io\]/,$d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
          rm -f Cargo.lock

      - name: Test (default features)
        run: cargo test

      - name: Test (all-codecs)
        run: cargo test --features all-codecs

      - name: Test (std only, no codecs)
        run: cargo test --no-default-features --features std

      - name: Test (individual codecs)
        run: |
          cargo test --no-default-features --features "std,fax"
          cargo test --no-default-features --features "std,jpeg"
          cargo test --no-default-features --features "std,webp"
          cargo test --no-default-features --features "std,zstd"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|, path = "\.\./zenpixels/zenpixels"||g' \
            -e '/\[patch.crates-io\]/,$d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
          rm -f Cargo.lock

      - name: Clippy (all-codecs)
        run: cargo clippy --all-targets --features all-codecs -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|, path = "\.\./zenpixels/zenpixels"||g' \
            -e '/\[patch.crates-io\]/,$d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml
          rm -f Cargo.lock

      - name: Check MSRV
        run: cargo hack check --rust-version
